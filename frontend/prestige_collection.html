<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Collection — AutoVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    
<link href="styles.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ── AUTOVAULT STANDARD CSS ── */
body { padding-top: 80px; overflow-x: hidden; background: var(--dark, #0a0a0c); font-family: var(--font-body, 'Inter'); }
.filter-bar { 
    background: rgba(10,10,12,0.8); backdrop-filter: blur(20px); 
    border-bottom: 1px solid rgba(255,255,255,0.05); 
    position: sticky; top: 0; z-index: 100; padding: 20px 0;
    display: flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap;
}
.flt {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: #fff; padding: 10px 20px; border-radius: 8px; font-family: 'Inter';
    font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase; cursor: none; transition: all 0.3s ease;
}
.flt:hover, .flt.has-active { border-color: #ff3300; background: rgba(255,51,0,0.1); }
.tags-bar { background: transparent; padding: 20px 60px 0; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.a-tag { background: rgba(255,51,0,0.2); border: 1px solid #ff3300; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; cursor: none; transition: 0.3s; }
.a-tag:hover { background: #ff3300; }

.cars-wrap { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
#grid, #car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; max-width: 1400px; margin: 40px auto; padding: 0 20px; }

/* ── CAR CARD STANDARD (LIKE INDEX.HTML) ── */
.car-card {
    background: rgba(15,15,18,0.6);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px; overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.4s cubic-bezier(0.19,1,0.22,1), border-color 0.4s !important;
    display: flex; flex-direction: column; position: relative;
    cursor: none;
}
.car-card:hover { border-color: #ff3300 !important; transform: translateY(-10px) !important; box-shadow: 0 10px 40px rgba(255,51,0,0.15) !important; }
.cvis { width: 100%; height: 220px; overflow: hidden; position: relative; }
.cvis img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.19,1,0.22,1); }
.car-card { box-shadow: 0 4px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,51,0,0.1) !important; }
.car-card:hover { border-color: #ff3300 !important; transform: translateY(-12px) scale(1.02) !important; box-shadow: 0 20px 40px rgba(255,51,0,0.2) !important; }
.car-card:hover .cvis img { transform: scale(1.1); }
.car-card:hover .cvis img { transform: scale(1.05); }
.cbody { padding: 25px 20px; display: flex; flex-direction: column; flex-grow: 1; }
.cname { font-family: 'Syne', sans-serif !important; text-transform: uppercase; color: #fff; font-size: 1.4rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
.cyear { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 15px; }
.cspecs { display: flex; gap: 10px; margin-bottom: 15px; color: #fff; font-size: 0.8rem; flex-wrap: wrap; }
.spill { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
.cprice-row { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; display: flex; justify-content: space-between; align-items: flex-end; }
.plbl { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 5px; }
.pval { font-family: 'Syne', sans-serif !important; color: #fff; font-size: 1.6rem; font-weight: 600; }
.cacts-strip { display: flex; gap: 10px; margin-top: 15px; }
.cas-btn { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; border-radius: 6px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: none; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; }
.cas-view { background: #ff3300; border-color: #ff3300; color: #fff; font-weight: 600; }
.cas-btn:hover { background: rgba(255,255,255,0.1); }
.cas-view:hover { background: #ff4411; transform: translateY(-2px); }

/* Remove old nav UI */
.page-nav { display: none !important; }
.ribbon-wrap { display: none !important; }

/* Prestige Hero Overrides */
.hero { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#hero-canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
#dark-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index:1; }
.hero-content { position: relative; z-index: 2; text-align: center; }
.hero-content h1 { font-family: 'Syne', sans-serif; font-size: clamp(3rem, 6vw, 6rem); font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: -0.02em; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.collection { padding: 5vw; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 5; background: var(--dark, #0a0a0c); }
.section-tag { font-family: 'Inter'; font-size: 0.8rem; color: #ff3300; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 10px; }
.section-title { font-family: 'Syne'; font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; color: #fff; margin-bottom: 30px; text-transform: uppercase; }

/* Filter Dropdowns overriding */
.flt-panel { background: rgba(15,15,18,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.flt-opt { padding: 10px 15px; border-radius: 6px; color: #fff; font-size: 0.9rem; transition: 0.2s; border: 1px solid transparent; margin-bottom: 5px; cursor: none; }
.flt-opt:hover, .flt-opt.sel { background: rgba(255,51,0,0.1); border-color: rgba(255,51,0,0.3); color: #ff3300; }

#rCountText { font-family: 'Syne'; font-size: 1.5rem; color: #fff; }
#rCount { color: #ff3300; }
.pagi-wrap { display: flex; justify-content: center; gap: 10px; margin: 40px 0; }
.pgb { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 40px; height: 40px; border-radius: 8px; font-family: 'Syne'; cursor: none; transition: 0.3s; }
.pgb:hover:not([disabled]) { border-color: #ff3300; color: #ff3300; }
.pgb.act { background: #ff3300; border-color: #ff3300; color: #fff; }
</style>
<nav class="aura-nav" style="background: rgba(10,10,12,0.8); display: flex; align-items: center; justify-content: space-between; padding: 22px 48px; position: fixed; width: 100%; top: 0; z-index: 1000; backdrop-filter: blur(12px);">
    <a href="index.html" class="logo hover-target" style="font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.65rem; color: #fff; text-decoration: none;">AutoVault</a>
    <div style="display:flex; gap:20px; align-items:center;" class="nav-links">
        <a href="index.html" class="hover-target" style="color:rgba(255,255,255,0.5); text-decoration:none; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; font-family:'Inter',sans-serif;">Home</a>
        <a href="all_listing.html" class="hover-target" style="color:rgba(255,255,255,0.5); text-decoration:none; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; font-family:'Inter',sans-serif;">Vehicles</a>
        <a href="prestige_collection.html" class="hover-target" style="color:#ff3300; text-decoration:none; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; font-family:'Inter',sans-serif;">Prestige</a>
        <a href="profile.html" class="hover-target" style="color:rgba(255,255,255,0.5); text-decoration:none; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; font-family:'Inter',sans-serif;">Contact</a>
    </div>
    <div class="nav-auth" id="navAuth"></div>
</nav>

</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    

    <header class="hero">
        <canvas id="hero-canvas"></canvas>
        <div id="dark-overlay"></div>
        <div class="hero-content">
            <h1>Prestige Collection</h1>
        </div>
    </header>

    <section class="collection">
        <span class="section-tag">Explore</span>
        <h2 class="section-title">The Vault</h2>

        <!-- Count badge — updated after fetch -->
        <p class="count-badge" id="count-badge" style="display:none">
            Showing <span id="shown-count">0</span> of <span id="total-count">0</span> vehicles
        </p>

        <!-- Loading -->
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <p class="loading-text">Curating the collection…</p>
        </div>

        <!-- Error -->
        <div class="error-state" id="error-state">
            <p>Unable to load the collection. Please check your connection and try again.</p>
            <button class="retry-btn" id="retry-btn">Retry</button>
        </div>

        <!-- Grid -->
        <div class="grid" id="car-grid"></div>

        <!-- Load more -->
        <div class="load-more-wrap" id="load-more-wrap">
            <button class="load-more-btn" id="load-more-btn">Load More</button>
        </div>
    </section>

    <!-- Supabase credentials — SUPABASE_URL and SUPABASE_ANON defined here -->
    <script src="config.js"></script>
    <script>
        // SUPABASE_URL and SUPABASE_ANON are now available from config.js
        const SUPABASE_ANON_KEY = SUPABASE_ANON;

        const PAGE_SIZE = 50;   // rows per request — stay well under Supabase's 1000 row default limit
        let   currentPage = 0;
        let   totalCount  = 0;
        let   allFetched  = false;
        let   isFetching  = false;

        // ─────────────────────────────────────────────────────────────────
        // FETCH — paginated, filtered to tier = 'luxury', sorted by price desc
        // Uses Supabase REST API directly (no SDK needed in browser)
        // ─────────────────────────────────────────────────────────────────
        async function fetchLuxuryCars(page = 0) {
            if (isFetching) return;
            isFetching = true;

            const from = page * PAGE_SIZE;
            const to   = from + PAGE_SIZE - 1;

            const url = `${SUPABASE_URL}/rest/v1/cars`
                + `?tier=eq.luxury`
                + `&order=price.desc`
                + `&select=title,brand,price,price_display,year,kms_covered,fuel_type,transmission,location,image,link,ownership`
                + `&offset=${from}&limit=${PAGE_SIZE}`;

            try {
                const res = await fetch(url, {
                    headers: {
                        'apikey':        SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        // Ask Supabase to return total count in the header
                        'Prefer':        'count=exact',
                    }
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || `HTTP ${res.status}`);
                }

                // Total count comes back in Content-Range header: "0-49/812"
                const contentRange = res.headers.get('Content-Range');
                if (contentRange) {
                    const match = contentRange.match(/\/(\d+)$/);
                    if (match) totalCount = parseInt(match[1], 10);
                }

                const cars = await res.json();

                if (cars.length < PAGE_SIZE) {
                    allFetched = true; // no more pages
                }

                return cars;

            } catch (err) {
                console.error('Supabase fetch error:', err);
                throw err;
            } finally {
                isFetching = false;
            }
        }

        // ─────────────────────────────────────────────────────────────────
        // RENDER CARDS
        // ─────────────────────────────────────────────────────────────────
        const grid        = document.getElementById('car-grid');
        const loadingEl   = document.getElementById('loading-state');
        const errorEl     = document.getElementById('error-state');
        const countBadge  = document.getElementById('count-badge');
        const shownCount  = document.getElementById('shown-count');
        const totalCountEl= document.getElementById('total-count');
        const loadMoreWrap= document.getElementById('load-more-wrap');
        const loadMoreBtn = document.getElementById('load-more-btn');

        function formatPrice(price, display) {
            if (display) return display;
            if (!price) return '--';
            return '₹' + Number(price).toLocaleString('en-IN');
        }

        function formatKms(kms) {
            if (!kms && kms !== 0) return '--';
            return (+kms).toLocaleString('en-IN') + ' km';
        }

        function renderCards(cars) {
            cars.forEach((car, i) => {
                const globalIndex = grid.children.length; // unique index across all pages

                const cardWrap = document.createElement('div');
                cardWrap.className = 'card-wrapper reveal-on-scroll';

                
                cardWrap.innerHTML = `
                  <div class="car-card">
                    <div class="cvis">
                      <img src="${car.image || ''}" onerror="this.src='https://images.unsplash.com/photo-1544839304-c9a92207b0ec?q=80&w=800&auto=format&fit=crop';" />
                    </div>
                    <div class="cbody">
                      <div class="cname">${car.title || 'Unknown'}</div>
                      <div class="cyear">${car.brand || ''}</div>
                      <div class="cspecs">
                          ${car.year ? `<span class="spill">${car.year}</span>` : ''}
                          ${car.kms_covered ? `<span class="spill">${formatKms(car.kms_covered)}</span>` : ''}
                          ${car.fuel_type ? `<span class="spill">${car.fuel_type}</span>` : ''}
                      </div>
                      <div class="cprice-row">
                          <div>
                              <span class="plbl">Estimated Value</span>
                              <div class="pval">${formatPrice(car.price, car.price_display)}</div>
                          </div>
                      </div>
                      <div class="cacts-strip">
                          <a href="${car.link || '#'}" class="cas-btn cas-view">View Details</a>
                      </div>
                    </div>
                  </div>
                `;


                grid.appendChild(cardWrap);

                // Smoke effect
                const smokeCont = cardWrap.querySelector('.smoke-container');
                let smokeInterval;
                cardWrap.addEventListener('mouseenter', () => {
                    smokeInterval = setInterval(() => {
                        const puff = document.createElement('div');
                        puff.className = 'smoke-puff';
                        puff.style.setProperty('--driftX', `${(Math.random() - 0.5) * 60}px`);
                        puff.style.animation = `smokeBillow ${1.5 + Math.random()}s ease-out forwards`;
                        smokeCont.appendChild(puff);
                        setTimeout(() => puff.parentNode && puff.parentNode.removeChild(puff), 2500);
                    }, 150);
                });
                cardWrap.addEventListener('mouseleave', () => clearInterval(smokeInterval));

                // Scroll reveal observer
                revealObserver.observe(cardWrap);
            });

            // Update count badge
            const rendered = grid.children.length;
            shownCount.textContent  = rendered;
            totalCountEl.textContent = totalCount || rendered;
            countBadge.style.display = 'block';
        }

        // ─────────────────────────────────────────────────────────────────
        // SCROLL REVEAL
        // ─────────────────────────────────────────────────────────────────
        const revealObserver = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    obs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        // ─────────────────────────────────────────────────────────────────
        // INITIAL LOAD
        // ─────────────────────────────────────────────────────────────────
        async function loadPage(page) {
            try {
                if (page === 0) {
                    loadingEl.style.display = 'flex';
                    errorEl.style.display   = 'none';
                } else {
                    loadMoreBtn.disabled    = true;
                    loadMoreBtn.textContent = 'Loading…';
                }

                const cars = await fetchLuxuryCars(page);

                loadingEl.style.display = 'none';
                renderCards(cars);

                // Show / hide load more button
                if (!allFetched && totalCount > grid.children.length) {
                    loadMoreWrap.style.display = 'flex';
                    loadMoreBtn.disabled       = false;
                    loadMoreBtn.textContent    = 'Load More';
                } else {
                    loadMoreWrap.style.display = 'none';
                }

            } catch (err) {
                loadingEl.style.display    = 'none';
                errorEl.style.display      = 'flex';
                loadMoreBtn.disabled       = false;
                loadMoreBtn.textContent    = 'Load More';
            }
        }

        loadPage(0);

        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            loadPage(currentPage);
        });

        document.getElementById('retry-btn').addEventListener('click', () => {
            currentPage = 0;
            allFetched  = false;
            grid.innerHTML = '';
            loadPage(0);
        });

        // ─────────────────────────────────────────────────────────────────
        // HERO CANVAS ANIMATION
        // ─────────────────────────────────────────────────────────────────
        const canvas      = document.getElementById("hero-canvas");
        const ctx         = canvas.getContext("2d");
        const darkOverlay = document.getElementById("dark-overlay");

        const TOTAL_FRAMES = 240;
        let currentFrame   = 1;
        let isPlaying      = false;
        const images       = [];

        function resizeCanvas() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            if (images[currentFrame]) drawFrame(currentFrame);
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        const getImagePath = (index) =>
            `../data/prestige_hero/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        const firstImg  = new Image();
        firstImg.src    = getImagePath(1);
        firstImg.onload = () => {
            images[1] = firstImg;
            drawFrame(1);
            setTimeout(startAutoSequence, 500);
        };
        for (let i = 2; i <= TOTAL_FRAMES; i++) {
            const img  = new Image();
            img.src    = getImagePath(i);
            img.onload = () => {};
            images[i]  = img;
        }

        function drawFrame(index) {
            const img = images[index];
            if (!img || !img.complete) return;
            const cw = canvas.width, ch = canvas.height;
            const iw = img.width,    ih = img.height;
            const scale = Math.max(cw / iw, ch / ih);
            const sw = iw * scale, sh = ih * scale;
            ctx.clearRect(0, 0, cw, ch);
            ctx.drawImage(img, (cw - sw) / 2, (ch - sh) / 2, sw, sh);
            if (index <= 21) {
                const progress  = (index - 1) / 20;
                darkOverlay.style.opacity = (0.8 - progress * 0.8).toFixed(2);
            } else {
                darkOverlay.style.opacity = '0';
            }
        }

        let lastDrawTime = 0;
        const FPS = 24, FRAME_DURATION = 1000 / FPS;

        function animateSequence(ts) {
            if (!isPlaying) return;
            if (ts - lastDrawTime >= FRAME_DURATION) {
                lastDrawTime = ts;
                currentFrame = currentFrame >= TOTAL_FRAMES ? 1 : currentFrame + 1;
                drawFrame(currentFrame);
            }
            requestAnimationFrame(animateSequence);
        }

        function startAutoSequence() {
            isPlaying = true;
            requestAnimationFrame(ts => { lastDrawTime = ts; animateSequence(ts); });
        }

        // ─────────────────────────────────────────────────────────────────
        // CURSOR
        // ─────────────────────────────────────────────────────────────────
        const cursorIcon = document.getElementById('cursor');
        const ringIcon   = document.getElementById('cursorRing');
        let mx = window.innerWidth / 2, my = window.innerHeight / 2, rx = mx, ry = my;

        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cursorIcon.style.left = mx + 'px';
            cursorIcon.style.top  = my + 'px';
        });

        (function animRing() {
            rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
            ringIcon.style.left = rx + 'px'; ringIcon.style.top = ry + 'px';
            requestAnimationFrame(animRing);
        })();

        document.addEventListener('mouseover', e => {
            if (e.target.closest('a, button, .card-wrapper, .interactive')) {
                cursorIcon.style.width  = '20px'; cursorIcon.style.height = '20px';
                ringIcon.style.width    = '54px'; ringIcon.style.height   = '54px';
            }
        });
        document.addEventListener('mouseout', e => {
            if (e.target.closest('a, button, .card-wrapper, .interactive')) {
                cursorIcon.style.width  = '10px'; cursorIcon.style.height = '10px';
                ringIcon.style.width    = '36px'; ringIcon.style.height   = '36px';
            }
        });
    </script>

  <div id="cursor"></div>
  <div id="cursor-follower"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="global-auth.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);
    const cObj = document.getElementById('cursor');
    const fObj = document.getElementById('cursor-follower');
    if(cObj && fObj) {
        let posX = 0, posY = 0, mouseX = 0, mouseY = 0;
        gsap.to({}, 0.016, { repeat: -1, onRepeat: () => { posX += (mouseX - posX)/9; posY += (mouseY - posY)/9; gsap.set(fObj, {css: {left: posX, top: posY}}); gsap.set(cObj, {css: {left: mouseX, top: mouseY}}); } });
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    }
    
    // Add hover-target to cards dynamically
    setInterval(() => {
       document.querySelectorAll('.car-card:not(.hover-bound), a:not(.hover-bound), button:not(.hover-bound), .flt:not(.hover-bound)').forEach(c => {
           c.classList.add('hover-bound', 'hover-target');
           c.addEventListener('mouseenter', () => document.body.classList.add('hover-active'));
           c.addEventListener('mouseleave', () => document.body.classList.remove('hover-active'));
       });
       document.querySelectorAll('.car-card:not(.gsap-bound)').forEach((c, idx) => {
          c.classList.add('gsap-bound');
          gsap.fromTo(c, { opacity: 0, scale: 0.95, y: 40 }, { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: "power3.out", scrollTrigger: { trigger: c, start: 'top bottom-=50', toggleActions: 'play none none none' } });
       });
    }, 500);
  </script>

</body>
</html>
