<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prestige Collection — AutoVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C8903A;
      --gold-light: #E8B96A;
      --gold-dim: rgba(200,144,58,0.15);
      --gold-glow: rgba(200,144,58,0.4);
      --bg: #060608;
      --bg2: #0a0b0f;
      --panel: rgba(12,13,18,0.92);
      --text: #f0ece4;
      --muted: rgba(240,236,228,0.45);
      --border: rgba(200,144,58,0.18);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    #cursor {
      position: fixed; top:0; left:0; width:10px; height:10px;
      background: var(--gold); border-radius:50%; pointer-events:none;
      z-index:9999; transform:translate(-50%,-50%);
      transition: width .15s, height .15s, background .2s;
      mix-blend-mode: screen;
    }
    #cursorRing {
      position:fixed; top:0; left:0; width:36px; height:36px;
      border:1px solid var(--gold-glow); border-radius:50%;
      pointer-events:none; z-index:9998; transform:translate(-50%,-50%);
      transition: width .2s, height .2s;
    }
    body:has(a:hover) #cursor, body:has(button:hover) #cursor,
    body:has(.car-card-3d:hover) #cursor { width:18px; height:18px; }
    body:has(a:hover) #cursorRing, body:has(button:hover) #cursorRing { width:58px; height:58px; }

    /* ── NAV ── */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:1000;
      display:flex; align-items:center; justify-content:space-between;
      padding: 20px 48px;
      background: linear-gradient(to bottom, rgba(6,6,8,0.95), transparent);
      backdrop-filter: blur(0px);
      transition: background .4s, backdrop-filter .4s, padding .4s;
    }
    nav.scrolled {
      background: rgba(6,6,8,0.97);
      backdrop-filter: blur(20px);
      padding: 14px 48px;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family:'Cinzel', serif; font-size:1.3rem; letter-spacing:.08em; text-decoration:none; color:var(--text); }
    .nav-logo span:last-child { color:var(--gold); }
    .nav-back {
      display:flex; align-items:center; gap:10px;
      color: var(--muted); text-decoration:none; font-size:.82rem;
      font-family:'Barlow Condensed',sans-serif; letter-spacing:.12em;
      text-transform:uppercase; transition: color .3s;
    }
    .nav-back:hover { color:var(--gold); }
    .nav-back svg { transition: transform .3s; }
    .nav-back:hover svg { transform: translateX(-4px); }

    /* ── HERO ── */
    .hero-prestige {
      position: relative; height: 100vh; display:flex;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    .hero-bg-scene {
      position:absolute; inset:0;
      background: radial-gradient(ellipse 80% 60% at 50% 70%, rgba(200,144,58,0.06) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 80% 20%, rgba(200,144,58,0.04) 0%, transparent 60%),
                  linear-gradient(180deg, #060608 0%, #0a0910 50%, #060608 100%);
    }
    .hero-grid {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(200,144,58,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,144,58,0.04) 1px, transparent 1px);
      background-size: 80px 80px;
      transform: perspective(600px) rotateX(25deg) scale(1.5);
      transform-origin: center bottom;
      opacity: 0.6;
    }
    .hero-scan-line {
      position:absolute; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
      animation: scanDown 6s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes scanDown {
      0% { top:-2%; opacity:0; }
      5% { opacity:0.5; }
      95% { opacity:0.5; }
      100% { top:102%; opacity:0; }
    }

    .hero-content {
      position:relative; z-index:2; text-align:center;
    }
    .hero-eyebrow {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.75rem; letter-spacing:.35em;
      text-transform:uppercase; color:var(--gold);
      margin-bottom:24px; opacity:0;
      animation: fadeUp .8s .3s forwards;
    }
    .hero-title-main {
      font-family:'Cinzel Decorative', serif;
      font-size: clamp(3rem, 7vw, 7rem);
      font-weight:700; line-height:1.05;
      letter-spacing:.04em;
      background: linear-gradient(135deg, #fff 0%, var(--gold-light) 40%, var(--gold) 70%, #8a5a1a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip:text;
      opacity:0; animation: fadeUp .9s .5s forwards;
    }
    .hero-sub-line {
      display:flex; align-items:center; gap:16px;
      justify-content:center; margin:20px 0 32px;
      opacity:0; animation: fadeUp .7s .7s forwards;
    }
    .hero-sub-line::before, .hero-sub-line::after {
      content:''; flex:1; max-width:120px; height:1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .hero-sub-line::after { background: linear-gradient(to left, transparent, var(--gold)); }
    .hero-sub-text {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.8rem; letter-spacing:.3em; text-transform:uppercase; color:var(--muted);
    }
    .hero-stats {
      display:flex; gap:48px; justify-content:center;
      opacity:0; animation: fadeUp .7s .9s forwards;
    }
    .hstat { text-align:center; }
    .hstat-num {
      font-family:'Cinzel',serif; font-size:1.8rem; color:var(--gold);
      font-weight:600; display:block;
    }
    .hstat-lbl {
      font-size:.7rem; letter-spacing:.2em; text-transform:uppercase;
      color:var(--muted); font-family:'Barlow Condensed',sans-serif;
    }
    .scroll-cue {
      position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:8px;
      opacity:0; animation: fadeUp .6s 1.2s forwards;
    }
    .scroll-cue-line {
      width:1px; height:60px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: pulseDown 2s ease-in-out infinite;
    }
    @keyframes pulseDown { 0%,100%{opacity:.3; transform:scaleY(1)} 50%{opacity:1; transform:scaleY(1.2); transform-origin:top} }
    .scroll-cue-text {
      font-size:.6rem; letter-spacing:.25em; text-transform:uppercase;
      color:var(--muted); font-family:'Barlow Condensed',sans-serif;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── FILTERS ── */
    .filters-section {
      position: sticky; top: 65px; z-index: 100;
      padding: 0 48px;
      background: rgba(6,6,8,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
    }
    .filters-inner {
      display:flex; align-items:center; gap:0;
      padding: 16px 0;
      overflow-x:auto; scrollbar-width:none;
    }
    .filters-inner::-webkit-scrollbar { display:none; }
    .filter-label {
      font-size:.65rem; letter-spacing:.25em; text-transform:uppercase;
      color:var(--gold); font-family:'Barlow Condensed',sans-serif;
      white-space:nowrap; margin-right:20px; padding-right:20px;
      border-right:1px solid var(--border);
    }
    .filter-btn {
      background:none; border:1px solid transparent; color:var(--muted);
      font-family:'Barlow Condensed',sans-serif; font-size:.78rem;
      letter-spacing:.12em; text-transform:uppercase;
      padding: 7px 18px; cursor:none; white-space:nowrap;
      transition: all .25s; border-radius:2px;
    }
    .filter-btn:hover { color:var(--gold); border-color:var(--border); }
    .filter-btn.active {
      color:var(--bg); background:var(--gold); border-color:var(--gold);
    }
    .filter-sep { width:1px; height:22px; background:var(--border); margin:0 8px; flex-shrink:0; }
    .sort-select {
      margin-left:auto; flex-shrink:0;
      background:transparent; border:1px solid var(--border);
      color:var(--muted); font-family:'Barlow Condensed',sans-serif;
      font-size:.75rem; letter-spacing:.1em; padding:7px 14px;
      cursor:pointer; outline:none; border-radius:2px;
    }
    .sort-select option { background:#0a0b0f; }
    .results-count {
      font-size:.7rem; color:var(--muted);
      font-family:'Barlow Condensed',sans-serif;
      letter-spacing:.1em; margin-left:16px; white-space:nowrap;
    }
    .results-count span { color:var(--gold); }

    /* ── GRID SECTION ── */
    .collection-section {
      padding: 60px 48px 120px;
      min-height: 100vh;
    }
    .section-headline {
      display:flex; align-items:baseline; gap:16px;
      margin-bottom: 48px;
    }
    .section-headline h2 {
      font-family:'Cinzel',serif; font-size:1.6rem; letter-spacing:.06em;
    }
    .section-headline .hl-gold { color:var(--gold); }
    .section-headline .hl-line {
      flex:1; height:1px;
      background:linear-gradient(to right, var(--gold-dim), transparent);
    }

    /* ── CAR CARDS GRID ── */
    .cars-grid-3d {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .car-card-3d {
      position:relative; overflow:hidden;
      background: var(--panel);
      border:1px solid var(--border);
      border-radius:4px;
      cursor:none;
      transform: translateY(40px); opacity:0;
      transition: transform .5s, opacity .5s, border-color .3s, box-shadow .3s;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .car-card-3d.visible {
      transform: translateY(0); opacity:1;
    }
    .car-card-3d:hover {
      border-color: rgba(200,144,58,0.5);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(200,144,58,0.08), inset 0 1px 0 rgba(200,144,58,0.15);
    }

    .card-img-wrap {
      position:relative; height:220px; overflow:hidden;
      background: linear-gradient(135deg, #0c0d14, #141520);
    }
    .card-img-wrap::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to bottom, transparent 40%, rgba(6,6,8,0.95) 100%);
    }
    .card-img {
      width:100%; height:100%; object-fit:cover;
      transition: transform .6s cubic-bezier(.25,.46,.45,.94), filter .4s;
      filter: brightness(0.9) saturate(1.1);
    }
    .car-card-3d:hover .card-img {
      transform: scale(1.06);
      filter: brightness(1) saturate(1.2);
    }
    .card-img-fallback {
      width:100%; height:100%; display:flex; align-items:center; justify-content:center;
      background: linear-gradient(135deg, #0e0f18 0%, #161825 50%, #0e0f18 100%);
    }

    .card-brand-badge {
      position:absolute; top:16px; left:16px; z-index:2;
      font-family:'Barlow Condensed',sans-serif;
      font-size:.65rem; letter-spacing:.22em; text-transform:uppercase;
      color:var(--gold); padding:4px 12px;
      border:1px solid rgba(200,144,58,0.4);
      background: rgba(6,6,8,0.75); backdrop-filter:blur(8px);
      border-radius:2px;
    }
    .card-fuel-badge {
      position:absolute; top:16px; right:16px; z-index:2;
      font-size:.6rem; letter-spacing:.15em; text-transform:uppercase;
      color:var(--muted); padding:3px 10px;
      border:1px solid var(--border);
      background:rgba(6,6,8,0.7); backdrop-filter:blur(8px);
      border-radius:2px; font-family:'Barlow Condensed',sans-serif;
    }
    .card-fuel-badge.electric { color:#4af; border-color:rgba(64,160,255,0.3); }

    .card-body { padding:20px 22px 22px; }
    .card-title {
      font-family:'Cinzel',serif; font-size:1rem;
      font-weight:600; letter-spacing:.04em;
      margin-bottom:8px; line-height:1.3;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .card-location {
      display:flex; align-items:center; gap:5px;
      font-size:.72rem; color:var(--muted); margin-bottom:16px;
      font-family:'Barlow Condensed',sans-serif; letter-spacing:.08em;
    }
    .card-specs {
      display:grid; grid-template-columns:1fr 1fr 1fr;
      gap:8px; margin-bottom:18px;
    }
    .spec-item {
      background: rgba(200,144,58,0.04);
      border:1px solid rgba(200,144,58,0.08);
      border-radius:3px; padding:8px 10px; text-align:center;
      transition: background .3s, border-color .3s;
    }
    .car-card-3d:hover .spec-item {
      background: rgba(200,144,58,0.07);
      border-color: rgba(200,144,58,0.15);
    }
    .spec-val {
      display:block; font-family:'Barlow Condensed',sans-serif;
      font-size:.9rem; font-weight:700; color:var(--text); letter-spacing:.04em;
    }
    .spec-lbl {
      display:block; font-size:.58rem; letter-spacing:.15em;
      text-transform:uppercase; color:var(--muted); margin-top:2px;
    }

    .card-footer {
      display:flex; align-items:center; justify-content:space-between;
      padding-top:16px; border-top:1px solid rgba(200,144,58,0.1);
    }
    .card-price {
      font-family:'Cinzel',serif; font-size:1.15rem;
      color:var(--gold); font-weight:600; letter-spacing:.04em;
    }
    .card-cta {
      display:flex; align-items:center; gap:8px;
      font-family:'Barlow Condensed',sans-serif;
      font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
      color:var(--muted); text-decoration:none;
      transition: color .3s, gap .3s;
    }
    .card-cta:hover { color:var(--gold); gap:12px; }
    .card-cta svg { transition:transform .3s; }
    .card-cta:hover svg { transform:translateX(3px); }

    /* Shimmer line on hover */
    .card-shimmer {
      position:absolute; top:0; left:-100%; width:60%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(200,144,58,0.06), transparent);
      transition: left .6s ease;
      pointer-events:none;
    }
    .car-card-3d:hover .card-shimmer { left:150%; }

    /* ── FEATURED ROW ── */
    .featured-row {
      grid-column: 1 / -1;
      display:grid; grid-template-columns: 1fr 1fr;
      gap:24px;
    }
    @media(max-width:900px){ .featured-row { grid-template-columns:1fr; } }
    .featured-card {
      position:relative; overflow:hidden; border-radius:4px;
      border:1px solid var(--border); cursor:none;
      transform: translateY(40px); opacity:0;
      transition: transform .5s, opacity .5s, border-color .3s, box-shadow .3s;
    }
    .featured-card.visible {
      transform:translateY(0); opacity:1;
    }
    .featured-card:hover {
      border-color:rgba(200,144,58,0.5);
      box-shadow:0 30px 80px rgba(0,0,0,.7), 0 0 60px rgba(200,144,58,.1);
    }
    .featured-img-wrap { position:relative; height:300px; overflow:hidden; }
    .featured-img-wrap::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg, transparent 50%, rgba(6,6,8,0.85) 100%),
                 linear-gradient(to bottom, transparent 40%, rgba(6,6,8,1) 100%);
    }
    .featured-img {
      width:100%; height:100%; object-fit:cover;
      transition:transform .7s cubic-bezier(.25,.46,.45,.94), filter .5s;
      filter:brightness(0.85) saturate(1.2);
    }
    .featured-card:hover .featured-img { transform:scale(1.07); filter:brightness(0.95) saturate(1.3); }
    .featured-overlay {
      position:absolute; bottom:0; left:0; right:0;
      padding:28px 28px 24px; z-index:2;
    }
    .featured-tag {
      display:inline-block; font-size:.6rem; letter-spacing:.3em;
      text-transform:uppercase; color:var(--bg); background:var(--gold);
      padding:3px 12px; margin-bottom:10px; font-family:'Barlow Condensed',sans-serif;
    }
    .featured-title {
      font-family:'Cinzel',serif; font-size:1.4rem; font-weight:600;
      letter-spacing:.04em; margin-bottom:6px; line-height:1.2;
    }
    .featured-price {
      font-family:'Cinzel',serif; font-size:1.1rem; color:var(--gold);
    }
    .featured-specs-row {
      display:flex; gap:20px; margin-top:12px;
    }
    .fspec { font-size:.7rem; color:var(--muted); letter-spacing:.08em;
      font-family:'Barlow Condensed',sans-serif; }
    .fspec strong { color:var(--text); display:block; font-size:.85rem; }

    /* ── BRAND SPOTLIGHT ── */
    .brand-spotlight {
      padding: 80px 48px;
      border-top:1px solid var(--border);
    }
    .brand-grid {
      display:flex; flex-wrap:wrap; gap:16px; margin-top:36px;
    }
    .brand-pill {
      padding:10px 24px;
      border:1px solid var(--border);
      background:transparent;
      color:var(--muted); font-family:'Barlow Condensed',sans-serif;
      font-size:.8rem; letter-spacing:.2em; text-transform:uppercase;
      cursor:none; border-radius:2px; transition:all .3s;
    }
    .brand-pill:hover, .brand-pill.active-brand {
      background:var(--gold-dim); border-color:var(--gold);
      color:var(--gold);
    }
    .brand-pill .brand-count {
      margin-left:8px; opacity:.5; font-size:.7rem;
    }

    /* ── LOAD MORE ── */
    .load-more-section {
      display:flex; justify-content:center; padding:40px 0 80px;
    }
    .load-more-btn {
      position:relative; overflow:hidden;
      border:1px solid var(--gold); background:transparent;
      color:var(--gold); font-family:'Barlow Condensed',sans-serif;
      font-size:.82rem; letter-spacing:.25em; text-transform:uppercase;
      padding:16px 48px; cursor:none; border-radius:2px;
      transition:color .3s;
    }
    .load-more-btn::before {
      content:''; position:absolute; inset:0;
      background:var(--gold); transform:scaleX(0); transform-origin:left;
      transition:transform .4s cubic-bezier(.25,.46,.45,.94);
    }
    .load-more-btn:hover { color:var(--bg); }
    .load-more-btn:hover::before { transform:scaleX(1); }
    .load-more-btn span { position:relative; z-index:1; }

    /* ── FLOATING CAR COUNT ── */
    .floating-count {
      position:fixed; bottom:40px; right:48px; z-index:500;
      display:flex; align-items:center; gap:12px;
      background:rgba(6,6,8,0.9); border:1px solid var(--border);
      padding:12px 20px; border-radius:3px;
      backdrop-filter:blur(16px);
      opacity:0; transform:translateY(20px);
      transition: opacity .4s, transform .4s;
      pointer-events:none;
    }
    .floating-count.show { opacity:1; transform:translateY(0); }
    .fc-num { font-family:'Cinzel',serif; font-size:1.2rem; color:var(--gold); }
    .fc-lbl { font-size:.65rem; letter-spacing:.15em; text-transform:uppercase;
      color:var(--muted); font-family:'Barlow Condensed',sans-serif; }

    /* ── SCROLL REVEAL CLASSES ── */
    .reveal { opacity:0; transform:translateY(50px); transition:opacity .7s, transform .7s; }
    .reveal.in-view { opacity:1; transform:translateY(0); }

    /* ── PARTICLE OVERLAY ── */
    .hero-particles {
      position:absolute; inset:0; overflow:hidden; pointer-events:none;
    }
    .hp { position:absolute; border-radius:50%; pointer-events:none; }

    /* ── NO RESULTS ── */
    .no-results {
      grid-column:1/-1; text-align:center; padding:80px 0;
      font-family:'Cinzel',serif; color:var(--muted);
    }
    .no-results span { color:var(--gold); display:block; font-size:2rem; margin-bottom:16px; }

    /* ── SEARCH BAR ── */
    .search-wrap {
      position:relative; margin-left:16px;
    }
    .search-input {
      background:rgba(200,144,58,0.04); border:1px solid var(--border);
      color:var(--text); font-family:'Barlow Condensed',sans-serif;
      font-size:.78rem; letter-spacing:.1em; padding:7px 36px 7px 14px;
      width:220px; outline:none; border-radius:2px;
      transition:border-color .3s, background .3s;
    }
    .search-input::placeholder { color:rgba(240,236,228,0.25); }
    .search-input:focus { border-color:var(--gold-glow); background:rgba(200,144,58,0.07); }
    .search-icon {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      color:var(--muted); pointer-events:none;
    }

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      nav { padding:16px 20px; }
      nav.scrolled { padding:12px 20px; }
      .filters-section { padding:0 20px; }
      .collection-section { padding:40px 20px 80px; }
      .brand-spotlight { padding:50px 20px; }
      .cars-grid-3d { grid-template-columns:1fr; gap:16px; }
      .floating-count { right:20px; bottom:20px; }
      .hero-stats { gap:24px; }
      .hero-title-main { font-size:2.5rem; }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div id="cursorRing"></div>

  <!-- NAV -->
  <nav id="mainNav">
    <a class="nav-back" href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19L5 12l7-7"/></svg>
      Back to AutoVault
    </a>
    <a class="nav-logo" href="index.html"><span>Auto</span><span>Vault</span></a>
  </nav>

  <!-- HERO -->
  <div class="hero-prestige">

// ── HERO STAT COUNTUP ──
function countUp(el, target, suffix='', duration=1500){
  let start=null;
  function step(ts){
    if(!start)start=ts;
    const prog=Math.min((ts-start)/duration,1);
    const ease=1-Math.pow(1-prog,3);
    el.textContent=Math.round(target*ease)+suffix;
    if(prog<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
setTimeout(()=>{
  countUp(document.getElementById('hStat1'), ALL_CARS.length, '+');
  countUp(document.getElementById('hStat2'), new Set(ALL_CARS.map(c=>c.brand)).size, '');
  document.getElementById('hStat3').textContent='₹65Cr+';
}, 900);

// ── BUILD BRAND GRID ──
function buildBrands(){
  const brandMap = {};
  ALL_CARS.forEach(c=>{
    brandMap[c.brand]=(brandMap[c.brand]||0)+1;
  });
  const sorted = Object.entries(brandMap).sort((a,b)=>b[1]-a[1]);
  const grid = document.getElementById('brandGrid');
  grid.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='brand-pill'+(activeBrand==='all'?' active-brand':'');
  allBtn.innerHTML=`All <span class="brand-count">${ALL_CARS.length}</span>`;
  allBtn.onclick=()=>{ activeBrand='all'; buildBrands(); renderCars(); };
  grid.appendChild(allBtn);
  sorted.forEach(([brand,count])=>{
    const btn=document.createElement('button');
    btn.className='brand-pill'+(activeBrand===brand?' active-brand':'');
    btn.innerHTML=`${brand} <span class="brand-count">${count}</span>`;
    btn.onclick=()=>{ activeBrand=brand; buildBrands(); renderCars(); };
    grid.appendChild(btn);
  });
}

// ── FILTER / SORT LOGIC ──
function getFiltered(){
  let cars = [...ALL_CARS];
  if(activeBrand!=='all') cars=cars.filter(c=>c.brand===activeBrand);
  if(activeFilter==='Electric') cars=cars.filter(c=>c.fuel==='Electric');
  else if(activeFilter==='Petrol') cars=cars.filter(c=>c.fuel==='Petrol');
  else if(activeFilter==='Diesel') cars=cars.filter(c=>c.fuel==='Diesel');
  else if(activeFilter==='Automatic') cars=cars.filter(c=>c.type==='Automatic');
  else if(activeFilter==='Manual') cars=cars.filter(c=>c.type==='Manual');
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    cars=cars.filter(c=>c.title.toLowerCase().includes(q)||c.brand.toLowerCase().includes(q));
  }
  if(sortMode==='price-asc') cars.sort((a,b)=>a.price-b.price);
  else if(sortMode==='price-desc') cars.sort((a,b)=>b.price-a.price);
  else if(sortMode==='year-desc') cars.sort((a,b)=>(+b.year||0)-(+a.year||0));
  else if(sortMode==='kms-asc') cars.sort((a,b)=>(+a.kms||999999)-(+b.kms||999999));
  return cars;
}

// ── 3D TILT ──
function addTilt(card){
  card.addEventListener('mousemove', e=>{
    const r=card.getBoundingClientRect();
    const x=e.clientX-r.left, y=e.clientY-r.top;
    const cx=r.width/2, cy=r.height/2;
    const rx2=(y-cy)/cy*10;
    const ry2=(cx-x)/cx*10;
    card.style.transform=`perspective(800px) rotateX(${rx2}deg) rotateY(${ry2}deg) translateZ(8px) scale(1.02)`;
  });
  card.addEventListener('mouseleave', ()=>{
    card.style.transform='perspective(800px) rotateX(0) rotateY(0) translateZ(0) scale(1)';
    card.style.transition='transform .5s cubic-bezier(.25,.46,.45,.94)';
  });
  card.addEventListener('mouseenter', ()=>{
    card.style.transition='transform .1s';
  });
}

            <span class="spec-lbl">Ownership</span>
          </div>
        </div>
        <div class="card-footer">
          <div class="card-price">${car.price_display}</div>
          <a class="card-cta" href="${car.link}" target="_blank" rel="noopener">
            View Details
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>`;

    grid.appendChild(card);
    addTilt(card);
    setTimeout(()=>card.classList.add('visible'), 20+i*50);
  });

  // Load more
  const lms = document.getElementById('loadMoreSection');
  if(filtered.length > visibleCount){
    lms.style.display='flex';
    document.getElementById('loadMoreBtn').querySelector('span').textContent=
      `Load More Vehicles (${filtered.length - visibleCount} remaining)`;
  } else {
    lms.style.display='none';
  }
}

// ── LOAD MORE ──
document.getElementById('loadMoreBtn').addEventListener('click', ()=>{
  visibleCount += 12;
  renderCars();
  window.scrollBy({top:300, behavior:'smooth'});
});

// ── FILTERS ──
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    visibleCount = 18;
    renderCars();
  });
});

document.getElementById('sortSelect').addEventListener('change', e=>{
  sortMode = e.target.value;
  visibleCount = 18;
  renderCars();
});

document.getElementById('searchInput').addEventListener('input', e=>{
  searchQuery = e.target.value;
  visibleCount = 18;
  renderCars();
});

// ── SCROLL REVEAL ──
const revealObs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('in-view');
  });
}, {threshold:0.15});
document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));

// ── INIT ──
buildBrands();
renderCars();

// Observe cards after render for delayed reveals
setTimeout(()=>{
  const cardObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting && !e.target.classList.contains('visible')){
        e.target.classList.add('visible');
      }
    });
  }, {threshold:0.1});
  document.querySelectorAll('.car-card-3d').forEach(c=>cardObs.observe(c));
}, 500);
</script>
</body>
</html>
