<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Collection — AutoVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C8903A;
            --bg: #030304;
            --bg-card: #0a0b0f;
            --text: #f0ece4;
            --muted: #888;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none; /* Hide default cursor */
        }
        
        /* ── CUSTOM CURSOR ── */
        .cursor {
            position: fixed; top:0; left:0; width:10px; height:10px;
            background: var(--gold); border-radius:50%; pointer-events:none;
            z-index:9999; transform:translate(-50%,-50%);
            transition: width .15s, height .15s, background .2s;
            mix-blend-mode: screen;
        }
        .cursor-ring {
            position:fixed; top:0; left:0; width:36px; height:36px;
            border:1px solid rgba(200,144,58,0.4); border-radius:50%;
            pointer-events:none; z-index:9998; transform:translate(-50%,-50%);
            transition: width .2s, height .2s;
        }
        
        /* Navigation */
        nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 6vw;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .nav-back {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
        }
        .nav-back:hover {
            color: var(--gold);
        }
        .nav-logo {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 0.1em;
        }
        .nav-logo span:last-child {
            color: var(--gold);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        #hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(3,3,4,0.1) 0%, rgba(3,3,4,0.3) 60%, var(--bg) 100%);
            z-index: 2;
        }
        /* Dynamic Overlay for darkness */
        #dark-overlay {
            position: absolute;
            inset: 0;
            background: #030304;
            opacity: 0.8; /* starts very dark */
            z-index: 2;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            margin-top: 10vh;
        }
        .hero p {
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 1s 0.5s forwards;
        }
        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 7vw, 7rem);
            font-weight: 400;
            letter-spacing: 0.05em;
            line-height: 1.1;
            opacity: 0;
            animation: fadeInUp 1s 0.8s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Minimal Collection Grid */
        .collection {
            padding: 120px 6vw;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
        }
        .section-tag {
            display: inline-block;
            color: var(--gold);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            margin-bottom: 80px;
            color: var(--text);
            text-align: center;
            font-weight: 400;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 40px;
        }
        /* ── CARD HOVER SMOKE EFFECT ── */
        .card-wrapper {
            position: relative;
            /* Give it perspective or isolation so the smoke strictly stays behind the card context */
            isolation: isolate;
            cursor: none; 
        }
        .card {
            background: linear-gradient(145deg, #0a0b0f, #111218);
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.6s ease;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
            z-index: 2; 
            height: 100%;
        }
        
        /* ── SCROLL ANIMATIONS ── */
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Smoke Particles Container */
        .smoke-container {
            position: absolute;
            inset: -40px; /* extends slightly outside to give smoke room to billow */
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .card-wrapper:hover .smoke-container {
            opacity: 1; /* reveal smoke layer on hover */
        }
        /* Individual smoke puff animation */
        .smoke-puff {
            position: absolute;
            bottom: 30%; /* Start erupting from roughly where an exhaust might be */
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(120,120,120,0.15) 0%, transparent 60%);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0;
            /* It is animated dynamically in JS, but fallback CSS can also work */
        }
        @keyframes smokeBillow {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translate(calc(-50% + var(--driftX)), -100px) scale(2.5); opacity: 0; }
        }

        .card-wrapper:hover .card {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 30px rgba(200,144,58,0.1);
            border-color: rgba(200,144,58,0.3);
        }
        .card-img-wrap {
            position: relative;
            width: 100%;
            height: 240px;
            overflow: hidden;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .card:hover .card-img {
            opacity: 1;
            transform: scale(1.05);
        }
        .card-info {
            padding: 30px;
        }
        .brand {
            color: var(--gold);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 10px;
        }
        .title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.3;
        }
        .specs {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .spec-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .spec-val {
            font-size: 1.1rem;
            font-weight: 500;
        }
        .spec-lbl {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            font-family: 'Cinzel', serif;
            font-size: 1.25rem;
            color: var(--gold);
        }
        .link {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .link:hover {
            color: var(--gold);
        }
        
        @media(max-width: 768px) {
            nav { padding: 30px 20px; }
            .collection { padding: 60px 20px 80px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

                            </div>
                            <div class="spec-item">
                                <span class="spec-val">${car.kms ? (+car.kms).toLocaleString('en-IN')+'km' : '--'}</span>
                                <span class="spec-lbl">Mileage</span>
                            </div>
                        </div>
                        
                        <div class="footer-row">
                            <div class="price">${car.price_display}</div>
                            <a href="${car.link}" target="_blank" class="link interactive">
                                View Details 
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            
            grid.appendChild(cardWrap);

            // Dynamically inject smoke puffs to animation logic
            const smokeCont = cardWrap.querySelector('.smoke-container');
            let smokeInterval;
            
            cardWrap.addEventListener('mouseenter', () => {
                // Generate a continuous puff stream
                smokeInterval = setInterval(() => {
                    const puff = document.createElement('div');
                    puff.className = 'smoke-puff';
                    puff.style.setProperty('--driftX', `${(Math.random() - 0.5) * 60}px`);
                    puff.style.animation = `smokeBillow ${1.5 + Math.random() * 1}s ease-out forwards`;
                    
                    smokeCont.appendChild(puff);
                    
                    // Cleanup puff
                    setTimeout(() => {
                        if(puff.parentNode) puff.parentNode.removeChild(puff);
                    }, 2500);
                }, 150); // new puff every 150ms
            });

            cardWrap.addEventListener('mouseleave', () => {
                clearInterval(smokeInterval);
                // Slowly let existing ones drift away
            });
        });

        // ── SCROLL REVEAL OBSERVER ──
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const revealObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); // Reveal only once
                }
            });
        }, observerOptions);

        // Observe all cards after they are added to grid
        document.querySelectorAll('.reveal-on-scroll').forEach(el => {
            revealObserver.observe(el);
        });

        // ── HERO IMAGE SEQUENCE ──
        const canvas = document.getElementById("hero-canvas");
        const ctx = canvas.getContext("2d");
        const darkOverlay = document.getElementById("dark-overlay");

        const TOTAL_FRAMES = 240;
        let currentFrame = 1;
        let isPlaying = false;
        
        const images = [];
        let imagesLoaded = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (images[currentFrame]) {
                drawFrame(currentFrame);
            }
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        const getImagePath = (index) => {
            const paddedNumber = index.toString().padStart(3, '0');
            return `../data/prestige_hero/ezgif-frame-${paddedNumber}.jpg`;
        };

        // Preload first image immediately
        const firstImg = new Image();
        firstImg.src = getImagePath(1);
        firstImg.onload = () => {
             images[1] = firstImg;
             drawFrame(1);
             // Kick off the auto sequence
             setTimeout(() => {
                 startAutoSequence();
             }, 500); // slight delay on load before starting
        }

        // Preload rest lazily
        for (let i = 2; i <= TOTAL_FRAMES; i++) {
            const img = new Image();
            img.src = getImagePath(i);
            img.onload = () => {
                imagesLoaded++;
            };
            images[i] = img;
        }

        function drawFrame(index) {
            const img = images[index];
            if (!img) return;
            
            // Draw covering image center (object-fit: cover equivalent)
            const cw = canvas.width;
            const ch = canvas.height;
            const iw = img.width;
            const ih = img.height;
            
            const scale = Math.max(cw / iw, ch / ih);
            const sw = iw * scale;
            const sh = ih * scale;
            const sx = (cw - sw) / 2;
            const sy = (ch - sh) / 2;
            
            ctx.clearRect(0, 0, cw, ch);
            ctx.drawImage(img, sx, sy, sw, sh);
            
            // Dynamic darkness evaluation based on cinematic direction
            // Starts dark (0.8 opacity) and gradually lightens to 0 opacity by frame 21
            if (index <= 21) {
                 const progress = (index - 1) / 20; // 0 to 1
                 const opacity = 0.8 - (progress * 0.8);
                 darkOverlay.style.opacity = opacity.toFixed(2);
            } else {
                 darkOverlay.style.opacity = '0';
            }
        }

        let lastDrawTime = 0;
        const FPS = 24; // Medium speed, between fast and very slow cinematic
        const FRAME_DURATION = 1000 / FPS;

        function animateSequence(timestamp) {
            if (!isPlaying) return;
            
            // Throttle drawing down to target FPS for cinematic motion
            if (timestamp - lastDrawTime >= FRAME_DURATION) {
                lastDrawTime = timestamp;
                
                if (currentFrame >= TOTAL_FRAMES) {
                    currentFrame = 1; // loop back to the beginning
                } else {
                    currentFrame++;
                }

                drawFrame(currentFrame);
            }
            
            if (isPlaying) {
                requestAnimationFrame(animateSequence);
            }
        }

        // Start animation loop automatically once the first image is loaded
        function startAutoSequence() {
            isPlaying = true;
            requestAnimationFrame((timestamp) => {
                 lastDrawTime = timestamp;
                 animateSequence(timestamp);
            });
        }

        // ── CURSOR SCRIPT ──
        const cursorIcon = document.getElementById('cursor');
        const ringIcon   = document.getElementById('cursorRing');
        let mx=window.innerWidth/2, my=window.innerHeight/2, rx=mx, ry=my;
        
        document.addEventListener('mousemove', e => { 
             mx=e.clientX; my=e.clientY; 
             cursorIcon.style.left=mx+'px'; cursorIcon.style.top=my+'px'; 
        });
        function animRing(){ 
             rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; 
             ringIcon.style.left=rx+'px'; ringIcon.style.top=ry+'px'; 
             requestAnimationFrame(animRing); 
        }
        animRing();
        
        // Enhance cursor on interactable hover 
        // We use event delegation since some elements are dynamic
        document.addEventListener('mouseover', e => {
             const target = e.target.closest('a, button, .card-wrapper, .interactive');
             if(target) {
                 cursorIcon.style.width='20px'; cursorIcon.style.height='20px'; 
                 ringIcon.style.width='54px'; ringIcon.style.height='54px'; 
             }
        });
        document.addEventListener('mouseout', e => {
             const target = e.target.closest('a, button, .card-wrapper, .interactive');
             if(target) {
                 cursorIcon.style.width='10px'; cursorIcon.style.height='10px'; 
                 ringIcon.style.width='36px'; ringIcon.style.height='36px'; 
             }
        });

    </script>
</body>
</html>
