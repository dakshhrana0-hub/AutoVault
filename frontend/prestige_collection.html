<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Collection — AutoVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C8903A;
            --bg: #030304;
            --bg-card: #0a0b0f;
            --text: #f0ece4;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none;
        }

        /* ── CUSTOM CURSOR ── */
        .cursor {
            position: fixed; top:0; left:0; width:10px; height:10px;
            background: var(--gold); border-radius:50%; pointer-events:none;
            z-index:9999; transform:translate(-50%,-50%);
            transition: width .15s, height .15s, background .2s;
            mix-blend-mode: screen;
        }
        .cursor-ring {
            position:fixed; top:0; left:0; width:36px; height:36px;
            border:1px solid rgba(200,144,58,0.4); border-radius:50%;
            pointer-events:none; z-index:9998; transform:translate(-50%,-50%);
            transition: width .2s, height .2s;
        }

        /* ── NAV ── */
        nav {
            position: absolute; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 40px 6vw;
        }
        nav a { color: var(--text); text-decoration: none; transition: color 0.3s ease; }
        .nav-back {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 0.15em; color: var(--muted);
        }
        .nav-back:hover { color: var(--gold); }
        .nav-logo { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 0.1em; }
        .nav-logo span:last-child { color: var(--gold); }

        /* ── HERO ── */
        .hero {
            height: 100vh; display: flex; align-items: center;
            justify-content: center; position: relative; overflow: hidden;
        }
        #hero-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(3,3,4,0.1) 0%, rgba(3,3,4,0.3) 60%, var(--bg) 100%);
            z-index: 2;
        }
        #dark-overlay {
            position: absolute; inset: 0; background: #030304;
            opacity: 0.8; z-index: 2; transition: opacity 0.5s ease; pointer-events: none;
        }
        .hero-content { position: relative; z-index: 3; text-align: center; margin-top: 10vh; }
        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 7vw, 7rem);
            font-weight: 400; letter-spacing: 0.05em; line-height: 1.1;
            opacity: 0; animation: fadeInUp 1s 0.8s forwards;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── COLLECTION ── */
        .collection {
            padding: 120px 6vw;
            max-width: 1600px;
            margin: 0 auto;
        }
        .section-tag {
            display: block; color: var(--gold); font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.3em;
            margin-bottom: 20px; text-align: center;
        }
        .section-title {
            font-family: 'Cinzel', serif; font-size: 3.5rem;
            margin-bottom: 20px; color: var(--text);
            text-align: center; font-weight: 400;
        }

        /* ── COUNT BADGE ── */
        .count-badge {
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 70px;
        }
        .count-badge span {
            color: var(--gold);
            font-weight: 600;
        }

        /* ── LOADING STATE ── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 80px 0;
            color: var(--muted);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 1px solid rgba(200,144,58,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
        }

        /* ── ERROR STATE ── */
        .error-state {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 80px 0;
            color: var(--muted);
            text-align: center;
        }
        .error-state p { font-size: 0.9rem; max-width: 400px; line-height: 1.6; }
        .retry-btn {
            margin-top: 10px;
            padding: 12px 32px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Barlow', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: none;
            transition: background 0.3s, color 0.3s;
        }
        .retry-btn:hover { background: var(--gold); color: var(--bg); }

        /* ── GRID ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 40px;
        }

        /* ── CARD ── */
        .card-wrapper {
            position: relative; isolation: isolate; cursor: none;
        }
        .card {
            background: linear-gradient(145deg, #0a0b0f, #111218);
            border-radius: 4px; overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.6s ease;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative; z-index: 2; height: 100%;
        }
        .card-wrapper:hover .card {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 30px rgba(200,144,58,0.1);
            border-color: rgba(200,144,58,0.3);
        }

        /* Smoke */
        .smoke-container {
            position: absolute; inset: -40px; z-index: 1;
            pointer-events: none; overflow: hidden; border-radius: 10px;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .card-wrapper:hover .smoke-container { opacity: 1; }
        .smoke-puff {
            position: absolute; bottom: 30%; left: 50%;
            transform: translateX(-50%); width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(120,120,120,0.15) 0%, transparent 60%);
            border-radius: 50%; filter: blur(10px); opacity: 0;
        }
        @keyframes smokeBillow {
            0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            50%  { opacity: 0.8; }
            100% { transform: translate(calc(-50% + var(--driftX)), -100px) scale(2.5); opacity: 0; }
        }

        /* Scroll reveal */
        .reveal-on-scroll {
            opacity: 0; transform: translateY(40px);
            transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .reveal-on-scroll.visible { opacity: 1; transform: translateY(0); }

        .card-img-wrap { position: relative; width: 100%; height: 240px; overflow: hidden; }
        .card-img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.85; transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .card:hover .card-img { opacity: 1; transform: scale(1.05); }
        .card-info { padding: 30px; }
        .brand {
            color: var(--gold); font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.25em; margin-bottom: 10px;
        }
        .title { font-family: 'Cinzel', serif; font-size: 1.4rem; margin-bottom: 25px; line-height: 1.3; }
        .specs {
            display: flex; gap: 30px; margin-bottom: 25px;
            padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .spec-item { display: flex; flex-direction: column; gap: 4px; }
        .spec-val { font-size: 1.1rem; font-weight: 500; }
        .spec-lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }
        .footer-row { display: flex; justify-content: space-between; align-items: center; }
        .price { font-family: 'Cinzel', serif; font-size: 1.25rem; color: var(--gold); }
        .link {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em;
            color: var(--text); text-decoration: none; transition: color 0.3s;
            display: flex; align-items: center; gap: 6px;
        }
        .link:hover { color: var(--gold); }

        /* Load more */
        .load-more-wrap {
            display: none;
            justify-content: center;
            margin-top: 70px;
        }
        .load-more-btn {
            padding: 16px 56px;
            background: transparent;
            border: 1px solid rgba(200,144,58,0.5);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: none;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
            position: relative;
            overflow: hidden;
        }
        .load-more-btn:hover {
            background: rgba(200,144,58,0.08);
            border-color: var(--gold);
        }
        .load-more-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        @media(max-width: 768px) {
            nav { padding: 30px 20px; }
            .collection { padding: 60px 20px 80px; }
            .grid { grid-template-columns: 1fr; }
            .section-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <nav>
        <a href="index.html" class="nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19L5 12l7-7"/></svg>
            AutoVault
        </a>
        <a href="index.html" class="nav-logo"><span>Auto</span><span>Vault</span></a>
    </nav>

    <header class="hero">
        <canvas id="hero-canvas"></canvas>
        <div id="dark-overlay"></div>
        <div class="hero-content">
            <h1>Prestige Collection</h1>
        </div>
    </header>

    <section class="collection">
        <span class="section-tag">Explore</span>
        <h2 class="section-title">The Vault</h2>

        <!-- Count badge — updated after fetch -->
        <p class="count-badge" id="count-badge" style="display:none">
            Showing <span id="shown-count">0</span> of <span id="total-count">0</span> vehicles
        </p>

        <!-- Loading -->
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <p class="loading-text">Curating the collection…</p>
        </div>

        <!-- Error -->
        <div class="error-state" id="error-state">
            <p>Unable to load the collection. Please check your connection and try again.</p>
            <button class="retry-btn" id="retry-btn">Retry</button>
        </div>

        <!-- Grid -->
        <div class="grid" id="car-grid"></div>

        <!-- Load more -->
        <div class="load-more-wrap" id="load-more-wrap">
            <button class="load-more-btn" id="load-more-btn">Load More</button>
        </div>
    </section>

    <!-- Supabase credentials — SUPABASE_URL and SUPABASE_ANON defined here -->
    <script src="config.js"></script>
    <script>
        // SUPABASE_URL and SUPABASE_ANON are now available from config.js
        const SUPABASE_ANON_KEY = SUPABASE_ANON;

        const PAGE_SIZE = 50;   // rows per request — stay well under Supabase's 1000 row default limit
        let   currentPage = 0;
        let   totalCount  = 0;
        let   allFetched  = false;
        let   isFetching  = false;

        // ─────────────────────────────────────────────────────────────────
        // FETCH — paginated, filtered to tier = 'luxury', sorted by price desc
        // Uses Supabase REST API directly (no SDK needed in browser)
        // ─────────────────────────────────────────────────────────────────
        async function fetchLuxuryCars(page = 0) {
            if (isFetching) return;
            isFetching = true;

            const from = page * PAGE_SIZE;
            const to   = from + PAGE_SIZE - 1;

            const url = `${SUPABASE_URL}/rest/v1/cars`
                + `?tier=eq.luxury`
                + `&order=price.desc`
                + `&select=title,brand,price,price_display,year,kms_covered,fuel_type,transmission,location,image,link,ownership`
                + `&offset=${from}&limit=${PAGE_SIZE}`;

            try {
                const res = await fetch(url, {
                    headers: {
                        'apikey':        SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        // Ask Supabase to return total count in the header
                        'Prefer':        'count=exact',
                    }
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || `HTTP ${res.status}`);
                }

                // Total count comes back in Content-Range header: "0-49/812"
                const contentRange = res.headers.get('Content-Range');
                if (contentRange) {
                    const match = contentRange.match(/\/(\d+)$/);
                    if (match) totalCount = parseInt(match[1], 10);
                }

                const cars = await res.json();

                if (cars.length < PAGE_SIZE) {
                    allFetched = true; // no more pages
                }

                return cars;

            } catch (err) {
                console.error('Supabase fetch error:', err);
                throw err;
            } finally {
                isFetching = false;
            }
        }

        // ─────────────────────────────────────────────────────────────────
        // RENDER CARDS
        // ─────────────────────────────────────────────────────────────────
        const grid        = document.getElementById('car-grid');
        const loadingEl   = document.getElementById('loading-state');
        const errorEl     = document.getElementById('error-state');
        const countBadge  = document.getElementById('count-badge');
        const shownCount  = document.getElementById('shown-count');
        const totalCountEl= document.getElementById('total-count');
        const loadMoreWrap= document.getElementById('load-more-wrap');
        const loadMoreBtn = document.getElementById('load-more-btn');

        function formatPrice(price, display) {
            if (display) return display;
            if (!price) return '--';
            return '₹' + Number(price).toLocaleString('en-IN');
        }

        function formatKms(kms) {
            if (!kms && kms !== 0) return '--';
            return (+kms).toLocaleString('en-IN') + ' km';
        }

        function renderCards(cars) {
            cars.forEach((car, i) => {
                const globalIndex = grid.children.length; // unique index across all pages

                const cardWrap = document.createElement('div');
                cardWrap.className = 'card-wrapper reveal-on-scroll';

                cardWrap.innerHTML = `
                    <div class="smoke-container" id="smoke-${globalIndex}"></div>
                    <div class="card">
                        <div class="card-img-wrap">
                            <img
                                src="${car.image || ''}"
                                alt="${car.title || 'Car'}"
                                class="card-img"
                                onerror="this.src='https://images.unsplash.com/photo-1544839304-c9a92207b0ec?q=80&w=800&auto=format&fit=crop';"
                            />
                        </div>
                        <div class="card-info">
                            <div class="brand">${car.brand || ''}</div>
                            <div class="title">${car.title || 'Unknown'}</div>
                            <div class="specs">
                                <div class="spec-item">
                                    <span class="spec-val">${car.year || '--'}</span>
                                    <span class="spec-lbl">Year</span>
                                </div>
                                <div class="spec-item">
                                    <span class="spec-val">${formatKms(car.kms_covered)}</span>
                                    <span class="spec-lbl">Mileage</span>
                                </div>
                                ${car.fuel_type ? `
                                <div class="spec-item">
                                    <span class="spec-val">${car.fuel_type}</span>
                                    <span class="spec-lbl">Fuel</span>
                                </div>` : ''}
                            </div>
                            <div class="footer-row">
                                <div class="price">${formatPrice(car.price, car.price_display)}</div>
                                <a href="${car.link || '#'}" target="_blank" rel="noopener" class="link interactive">
                                    View Details
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                </a>
                            </div>
                        </div>
                    </div>
                `;

                grid.appendChild(cardWrap);

                // Smoke effect
                const smokeCont = cardWrap.querySelector('.smoke-container');
                let smokeInterval;
                cardWrap.addEventListener('mouseenter', () => {
                    smokeInterval = setInterval(() => {
                        const puff = document.createElement('div');
                        puff.className = 'smoke-puff';
                        puff.style.setProperty('--driftX', `${(Math.random() - 0.5) * 60}px`);
                        puff.style.animation = `smokeBillow ${1.5 + Math.random()}s ease-out forwards`;
                        smokeCont.appendChild(puff);
                        setTimeout(() => puff.parentNode && puff.parentNode.removeChild(puff), 2500);
                    }, 150);
                });
                cardWrap.addEventListener('mouseleave', () => clearInterval(smokeInterval));

                // Scroll reveal observer
                revealObserver.observe(cardWrap);
            });

            // Update count badge
            const rendered = grid.children.length;
            shownCount.textContent  = rendered;
            totalCountEl.textContent = totalCount || rendered;
            countBadge.style.display = 'block';
        }

        // ─────────────────────────────────────────────────────────────────
        // SCROLL REVEAL
        // ─────────────────────────────────────────────────────────────────
        const revealObserver = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    obs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        // ─────────────────────────────────────────────────────────────────
        // INITIAL LOAD
        // ─────────────────────────────────────────────────────────────────
        async function loadPage(page) {
            try {
                if (page === 0) {
                    loadingEl.style.display = 'flex';
                    errorEl.style.display   = 'none';
                } else {
                    loadMoreBtn.disabled    = true;
                    loadMoreBtn.textContent = 'Loading…';
                }

                const cars = await fetchLuxuryCars(page);

                loadingEl.style.display = 'none';
                renderCards(cars);

                // Show / hide load more button
                if (!allFetched && totalCount > grid.children.length) {
                    loadMoreWrap.style.display = 'flex';
                    loadMoreBtn.disabled       = false;
                    loadMoreBtn.textContent    = 'Load More';
                } else {
                    loadMoreWrap.style.display = 'none';
                }

            } catch (err) {
                loadingEl.style.display    = 'none';
                errorEl.style.display      = 'flex';
                loadMoreBtn.disabled       = false;
                loadMoreBtn.textContent    = 'Load More';
            }
        }

        loadPage(0);

        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            loadPage(currentPage);
        });

        document.getElementById('retry-btn').addEventListener('click', () => {
            currentPage = 0;
            allFetched  = false;
            grid.innerHTML = '';
            loadPage(0);
        });

        // ─────────────────────────────────────────────────────────────────
        // HERO CANVAS ANIMATION
        // ─────────────────────────────────────────────────────────────────
        const canvas      = document.getElementById("hero-canvas");
        const ctx         = canvas.getContext("2d");
        const darkOverlay = document.getElementById("dark-overlay");

        const TOTAL_FRAMES = 240;
        let currentFrame   = 1;
        let isPlaying      = false;
        const images       = [];

        function resizeCanvas() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            if (images[currentFrame]) drawFrame(currentFrame);
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        const getImagePath = (index) =>
            `../data/prestige_hero/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        const firstImg  = new Image();
        firstImg.src    = getImagePath(1);
        firstImg.onload = () => {
            images[1] = firstImg;
            drawFrame(1);
            setTimeout(startAutoSequence, 500);
        };
        for (let i = 2; i <= TOTAL_FRAMES; i++) {
            const img  = new Image();
            img.src    = getImagePath(i);
            img.onload = () => {};
            images[i]  = img;
        }

        function drawFrame(index) {
            const img = images[index];
            if (!img || !img.complete) return;
            const cw = canvas.width, ch = canvas.height;
            const iw = img.width,    ih = img.height;
            const scale = Math.max(cw / iw, ch / ih);
            const sw = iw * scale, sh = ih * scale;
            ctx.clearRect(0, 0, cw, ch);
            ctx.drawImage(img, (cw - sw) / 2, (ch - sh) / 2, sw, sh);
            if (index <= 21) {
                const progress  = (index - 1) / 20;
                darkOverlay.style.opacity = (0.8 - progress * 0.8).toFixed(2);
            } else {
                darkOverlay.style.opacity = '0';
            }
        }

        let lastDrawTime = 0;
        const FPS = 24, FRAME_DURATION = 1000 / FPS;

        function animateSequence(ts) {
            if (!isPlaying) return;
            if (ts - lastDrawTime >= FRAME_DURATION) {
                lastDrawTime = ts;
                currentFrame = currentFrame >= TOTAL_FRAMES ? 1 : currentFrame + 1;
                drawFrame(currentFrame);
            }
            requestAnimationFrame(animateSequence);
        }

        function startAutoSequence() {
            isPlaying = true;
            requestAnimationFrame(ts => { lastDrawTime = ts; animateSequence(ts); });
        }

        // ─────────────────────────────────────────────────────────────────
        // CURSOR
        // ─────────────────────────────────────────────────────────────────
        const cursorIcon = document.getElementById('cursor');
        const ringIcon   = document.getElementById('cursorRing');
        let mx = window.innerWidth / 2, my = window.innerHeight / 2, rx = mx, ry = my;

        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cursorIcon.style.left = mx + 'px';
            cursorIcon.style.top  = my + 'px';
        });

        (function animRing() {
            rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
            ringIcon.style.left = rx + 'px'; ringIcon.style.top = ry + 'px';
            requestAnimationFrame(animRing);
        })();

        document.addEventListener('mouseover', e => {
            if (e.target.closest('a, button, .card-wrapper, .interactive')) {
                cursorIcon.style.width  = '20px'; cursorIcon.style.height = '20px';
                ringIcon.style.width    = '54px'; ringIcon.style.height   = '54px';
            }
        });
        document.addEventListener('mouseout', e => {
            if (e.target.closest('a, button, .card-wrapper, .interactive')) {
                cursorIcon.style.width  = '10px'; cursorIcon.style.height = '10px';
                ringIcon.style.width    = '36px'; ringIcon.style.height   = '36px';
            }
        });
    </script>
</body>
</html>
